name: PDP Parallel Check

on:
  workflow_dispatch:

jobs:

  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq

      - name: Generate matrix (limit 200 to stay under GitHub limit)
        id: generate
        run: |
          matrix=$(jq -c '[.data[] | {brand: .brand, code: .assortmentCode}] | .[:200]' productPageUrls.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT


  run-check:
    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run PDP check
        run: |
          mkdir output
          node checkPdpPages.js "${{ matrix.brand }}" "${{ matrix.code }}"
          mv *.json output/ || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ strategy.job-index }}
          path: output/
          if-no-files-found: ignore


  merge-results:
    needs: run-check
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge JSON files
        run: |
          mkdir -p final
          find artifacts -name "*.json" -exec cp {} final/ \;

      - name: Commit results to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p results
          cp final/*.json results/ || true

          git add results/

          if git diff --cached --quiet
          then
            echo "No changes"
          else
            git commit -m "Add PDP results"
            git push
          fi
