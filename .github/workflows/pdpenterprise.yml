name: PDP Enterprise Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pdp-scan
  cancel-in-progress: false


jobs:

# ------------------------------------------------
# 1️⃣ Build brand batches
# ------------------------------------------------

  build-batches:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:

      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate batches
        id: generate
        run: |

          echo "Preparing brand batches..."

          jq '[.data[] | {brand:.brand, code:.assortmentCode}]' productPageUrls.json > brands.json

          echo "Total brands:"
          jq length brands.json

          BATCH_SIZE=15

          MATRIX=$(jq -c \
          --argjson size $BATCH_SIZE '
          [range(0; length; $size) as $i
            | {batch: .[$i:$i+$size]}]
          ' brands.json)

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          echo "Total batches:"
          echo $MATRIX | jq length


# ------------------------------------------------
# 2️⃣ Run brand batches in parallel
# ------------------------------------------------

  scan:

    needs: build-batches
    runs-on: ubuntu-latest

    strategy:

      fail-fast: false
      max-parallel: 20

      matrix:
        include: ${{ fromJson(needs.build-batches.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Execute batch
        run: |

          mkdir results

          echo '${{ toJson(matrix.batch) }}' > batch.json

          node <<'NODE'

          const fs = require("fs")
          const { execSync } = require("child_process")

          const batch = JSON.parse(fs.readFileSync("batch.json","utf8"))

          console.log("Processing batch size:", batch.length)

          for (const item of batch) {

            console.log("Running:", item.brand, item.code)

            execSync(
              `node checkPdpPages.js "${item.brand}" "${item.code}"`,
              { stdio: "inherit" }
            )

          }

          NODE

          echo "Renaming files to prevent collision..."

          for f in *.json; do
            mv "$f" "results/${{ strategy.job-index }}_$f"
          done


      - name: Upload batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ strategy.job-index }}
          path: results/
          if-no-files-found: ignore


# ------------------------------------------------
# 3️⃣ Merge results safely
# ------------------------------------------------

  merge-results:

    needs: scan
    if: always()
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge results
        run: |

          echo "Cleaning previous results..."

          rm -rf results
          mkdir -p results
          mkdir -p final

          echo "Collecting artifact JSON files..."

          find artifacts -name "*.json" -exec cp {} final/ \;

          echo "Total JSON files collected:"
          ls final | wc -l

          echo "Creating merged problematic report..."

          jq -s '
          {
            generatedAt: now | todate,
            totalProblematicPages: map(.problematicPages // []) | add | length,
            problematicPages: map(.problematicPages // []) | add
          }
          ' final/*PROBLEMATIC*.json > final/pdpCheckResults_ALL_PROBLEMATIC.json

          echo "Copying final results..."

          cp final/*.json results/

      - name: Commit results
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add results/

          if git diff --cached --quiet
          then
            echo "No new results"
          else
            git commit -m "PDP scan results"
            git push
          fi
