name: PDP Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

# ------------------------------------------------
# 1️⃣ Generate brand matrix
# ------------------------------------------------

  build-matrix:

    runs-on: ubuntu-latest

    outputs:
      brands: ${{ steps.generate.outputs.brands }}

    steps:

      - uses: actions/checkout@v4

      - name: Build brand matrix
        id: generate
        run: |

          MATRIX=$(jq -c '[.data[] | {brand:.brand, code:.assortmentCode}]' productPageUrls.json)

          echo "brands=$MATRIX" >> $GITHUB_OUTPUT


# ------------------------------------------------
# 2️⃣ Run brands in parallel
# ------------------------------------------------

  scan:

    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:

      fail-fast: false

      max-parallel: 20

      matrix:

        brand: ${{ fromJson(needs.build-matrix.outputs.brands) }}

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run PDP check
        run: |

          node checkPdpPages.js \
            "${{ matrix.brand.brand }}" \
            "${{ matrix.brand.code }}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.brand.brand }}-${{ matrix.brand.code }}
          path: "*.json"


# ------------------------------------------------
# 3️⃣ Merge results
# ------------------------------------------------

  merge-results:

    needs: scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge results
        run: |

          mkdir -p results

          find artifacts -name "*.json" -exec cp {} results/ \;

          echo "Total result files:"
          ls results | wc -l

      - name: Commit results
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add results/

          if git diff --cached --quiet
          then
            echo "No changes"
          else
            git commit -m "PDP scan results"
            git push
          fi
