name: PDP Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

# -----------------------------
# 1️⃣ Build matrix from JSON
# -----------------------------

  build-matrix:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq

      - name: Generate matrix
        id: set-matrix
        run: |

          MATRIX=$(jq -c '.data | map({brand:.brand, code:.assortmentCode})' productPageUrls.json)

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          echo "Generated matrix:"
          echo $MATRIX


# -----------------------------
# 2️⃣ Run scanner in parallel
# -----------------------------

  scan:

    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:

      fail-fast: false
      max-parallel: 20

      matrix:
        include: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scanner
        run: |

          echo "Running for:"
          echo "${{ matrix.brand }} ${{ matrix.code }}"

          node checkPdpPages.js "${{ matrix.brand }}" "${{ matrix.code }}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.brand }}-${{ matrix.code }}
          path: "*.json"


# -----------------------------
# 3️⃣ Merge results
# -----------------------------

  merge:

    needs: scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge files
        run: |

          mkdir -p results

          find artifacts -name "*.json" -exec cp {} results/ \;

          echo "Total results:"
          ls results | wc -l

      - name: Commit results
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add results

          if git diff --cached --quiet
          then
            echo "No new results"
          else
            git commit -m "PDP scan results"
            git push
          fi
