name: PDP BIN Check
permissions:
  contents: write
on:
  workflow_dispatch:

jobs:
  check-pdp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run PDP Checker
        run: node checkPdpPages.js all

      - name: Move generated files
        run: |
          mv pdpCheckResults*.json results/ || true

      - name: Commit results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/
          git commit -m "Add PDP check results"
          git push
